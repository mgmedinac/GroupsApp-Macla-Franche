apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: consul-data-pvc
  namespace: groupsapp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consul
  namespace: groupsapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
  template:
    metadata:
      labels:
        app: consul
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.18
          args:
            - "agent"
            - "-server"
            - "-bootstrap-expect=1"
            - "-ui"
            - "-client=0.0.0.0"
            - "-data-dir=/consul/data"
          ports:
            - containerPort: 8500
            - containerPort: 8600
              protocol: TCP
            - containerPort: 8600
              protocol: UDP
          volumeMounts:
            - name: consul-data
              mountPath: /consul/data
          readinessProbe:
            tcpSocket:
              port: 8500
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8500
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: consul-data
          persistentVolumeClaim:
            claimName: consul-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: consul
  namespace: groupsapp
spec:
  selector:
    app: consul
  ports:
    - name: http
      port: 8500
      targetPort: 8500
      protocol: TCP
    - name: dns-tcp
      port: 8600
      targetPort: 8600
      protocol: TCP
    - name: dns-udp
      port: 8600
      targetPort: 8600
      protocol: UDP
  type: ClusterIP
